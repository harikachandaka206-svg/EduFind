<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduFind — Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1B2B4B;
      --blue: #3B6FE8;
      --blue-lt: #5B8FF9;
      --mint: #34C9A0;
      --bg: #F0F4FF;
      --white: #FFFFFF;
      --gray: #6B7A99;
      --border: #D4DCEF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    nav {
      background: var(--white);
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
    }

    .nav-logo {
      font-family: 'Nunito', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--navy);
    }
    .nav-logo span { color: var(--mint); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-library {
      padding: 8px 18px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-weight: 600;
    }

    .nav-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--mint));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-size: 42px;
      font-family: 'Nunito';
      font-weight: 900;
      color: var(--navy);
    }

    .hero h1 span { color: var(--blue); }

    .hero p {
      margin-top: 10px;
      color: var(--gray);
    }

    .search-card {
      background: white;
      max-width: 700px;
      margin: 30px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
    }

    .search-card h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 800;
    }

    .search-row {
      display: flex;
      gap: 15px;
    }

    .field {
      flex: 1;
    }

    .field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray);
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .level-label {
      margin-top: 15px;
      font-weight: 700;
      font-size: 12px;
      color: var(--gray);
    }

    .level-btns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .level-btn {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }

    .level-btn.active {
      border-color: var(--blue);
      background: rgba(59,111,232,0.1);
      color: var(--blue);
    }

    .btn-search {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .stats {
      text-align: center;
      background: linear-gradient(135deg, var(--navy), #2A4A8A);
      padding: 40px;
      color: white;
    }

    .stats-grid {
      display: flex;
      justify-content: center;
      gap: 60px;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 900;
      color: var(--mint);
    }

  </style>
</head>

<body>

<nav>
  <div class="nav-logo">Edu<span>Find</span></div>

  <div class="nav-right">
    <div class="nav-avatar">S</div>
  </div>
</nav>

<div class="hero">
  <h1>Find the <span>right resource</span><br/>for your level</h1>
  <p>Search any topic and get learning materials instantly</p>
</div>

<!-- FORM -->
<form class="search-card" action="/search" method="POST">

  <h2>🔍 What do you want to learn today?</h2>

  <div class="search-row">
    <div class="field">
      <label>Subject</label>
      <select name="subject" id="subject" required>
    <option value="">Select subject...</option>
    <option>Mathematics</option>
    <option>Science</option>
    <option>English</option>
    <option>History</option>
    <option>Geography</option>
    <option>Physics</option>
    <option>Chemistry</option>
    <option>Biology</option>
    <option>Computer Science</option>
    <option>Economics</option>
</select>
    </div>

    <div class="field">
      <label>Topic</label>
      <input type="text" name="topic" id="topic" required />
      <input type="hidden" name="level" id="level">
    </div>
  </div>

  <div class="level-label">Your Level</div>

  <div class="level-btns">
    <button type="button" class="level-btn" onclick="selectLevel(this)">📘 Middle School</button>
    <button type="button" class="level-btn" onclick="selectLevel(this)">🎓 High School</button>
    <button type="button" class="level-btn" onclick="selectLevel(this)">🎯 UG / Higher</button>
  </div>

  <button class="btn-search" type="submit">🔍 Find Resources</button>

</form>

<div class="stats">
  <div class="stats-grid">
    <div>
      <div class="stat-number">500+</div>
      Topics
    </div>
    <div>
      <div class="stat-number">3</div>
      Levels
    </div>
    <div>
      <div class="stat-number">100%</div>
      Free
    </div>
  </div>
</div>

<script>
function selectLevel(el) {
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('level').value =
    el.textContent.replace(/[^\w\s/]/g, "").trim();
}
</script>

</body>
</html>
